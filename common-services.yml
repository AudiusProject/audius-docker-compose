services:
  core:
    image: audius/core:${TAG:-current}
    restart: unless-stopped
    ports:
      - "26656:26656" # CometBFT P2P Server
      - "26657:26657" # CometBFT RPC Server
    profiles:
      - core
    mem_limit: 500m
    cpus: 0.1
    depends_on:
      db:
        condition: service_healthy

  base-postgres:
    image: postgres:11.22-bookworm
    shm_size: 2g
    restart: always
    command: postgres -c shared_buffers=2GB -c max_connections=500 -c shared_preload_libraries=pg_stat_statements
    healthcheck:
      test: ['CMD', 'pg_isready', '-U', 'postgres']
      interval: 10s
      timeout: 5s
    ports:
      - '127.0.0.1:5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    logging:
      options:
        max-size: 10m
        max-file: 3
        mode: non-blocking
        max-buffer-size: 100m
      driver: json-file

  base-redis:
    image: redis:7.0
    command: redis-server --save 60 1
    restart: always
    healthcheck:
      test: ['CMD', 'redis-cli', 'PING']
      interval: 10s
      timeout: 5s
    logging:
      options:
        max-size: 10m
        max-file: 3
        mode: non-blocking
        max-buffer-size: 100m
      driver: json-file
    volumes:
      - /var/redis_data:/data

  vector:
    image: audius/vector:0.39.0-alpine
    container_name: vector
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    logging:
      options:
        max-size: 10m
        max-file: 3
        mode: non-blocking
        max-buffer-size: 100m
      driver: json-file
